{% extends "base.html" %}
{% block title %}Поиск — Dispare{% endblock %}
{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Поиск и сравнение цен</h1>
</div>

<!-- Табы: одиночный / массовый -->
<div class="flex gap-2 mb-4">
    <button onclick="switchTab('single')" id="tab-single" class="tab-btn active">Один артикул</button>
    <button onclick="switchTab('bulk')" id="tab-bulk" class="tab-btn">Список</button>
    <button onclick="switchTab('file')" id="tab-file" class="tab-btn">Загрузить файл</button>
</div>

<!-- Одиночный поиск -->
<div id="panel-single" class="search-panel">
    <div class="flex gap-2 mb-2">
        <input type="text" id="single-input" placeholder="Артикул, например: 90311-47013"
               class="flex-1 border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none text-lg"
               onkeydown="if(event.key==='Enter')searchSingle()">
        <label class="flex items-center gap-2 text-sm text-gray-600 whitespace-nowrap">
            <input type="checkbox" id="single-fetch-market" class="rounded">
            Запросить Emex
        </label>
        <button onclick="searchSingle()" class="btn-primary">Найти</button>
    </div>
</div>

<!-- Массовый поиск -->
<div id="panel-bulk" class="search-panel hidden">
    <textarea id="bulk-input" rows="6" placeholder="Вставьте список артикулов (через запятую, точку с запятой или каждый с новой строки)"
              class="w-full border border-gray-300 rounded-lg px-4 py-2 mb-2 focus:ring-2 focus:ring-blue-500 outline-none font-mono text-sm"></textarea>
    <div class="flex items-center gap-3">
        <label class="flex items-center gap-2 text-sm text-gray-600">
            <input type="checkbox" id="bulk-fetch-market" class="rounded">
            Запросить Emex (платно)
        </label>
        <button onclick="searchBulk()" class="btn-primary">Найти все</button>
        <span id="bulk-count" class="text-sm text-gray-400"></span>
    </div>
</div>

<!-- Загрузка файла -->
<div id="panel-file" class="search-panel hidden">
    <div class="border-2 border-dashed border-gray-300 rounded-xl p-6 text-center">
        <input type="file" id="file-input" accept=".xlsx,.xls,.csv,.txt" class="hidden" onchange="onFileSelected()">
        <p class="text-gray-500 mb-2">Excel, CSV или TXT (один артикул на строку)</p>
        <button onclick="document.getElementById('file-input').click()" class="btn-secondary">Выбрать файл</button>
        <span id="file-name" class="text-sm text-gray-500 ml-2"></span>
    </div>
    <div class="flex items-center gap-3 mt-3">
        <label class="flex items-center gap-2 text-sm text-gray-600">
            <input type="checkbox" id="file-fetch-market" class="rounded">
            Запросить Emex
        </label>
        <button onclick="searchFile()" class="btn-primary" id="file-search-btn" disabled>Найти</button>
    </div>
</div>

<!-- Индикатор загрузки -->
<div id="loading" class="hidden my-8 text-center">
    <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
    <p class="text-gray-500 mt-2">Поиск...</p>
</div>

<!-- Результаты -->
<div id="results" class="mt-6"></div>

{% endblock %}

{% block scripts %}
<script>
function switchTab(tab) {
    document.querySelectorAll('.search-panel').forEach(p => p.classList.add('hidden'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.remove('hidden');
    document.getElementById('tab-' + tab).classList.add('active');
}

function onFileSelected() {
    const f = document.getElementById('file-input').files[0];
    document.getElementById('file-name').textContent = f ? f.name : '';
    document.getElementById('file-search-btn').disabled = !f;
}

async function searchSingle() {
    const q = document.getElementById('single-input').value.trim();
    if (!q) return;
    const fetchMarket = document.getElementById('single-fetch-market').checked;
    showLoading();
    try {
        const resp = await fetch(`/api/search/single?q=${encodeURIComponent(q)}&fetch_market=${fetchMarket}`);
        const data = await resp.json();
        renderResults([data]);
    } catch(e) {
        showError(e.message);
    }
    hideLoading();
}

async function searchBulk() {
    const text = document.getElementById('bulk-input').value.trim();
    if (!text) return;
    const fetchMarket = document.getElementById('bulk-fetch-market').checked;
    showLoading();
    try {
        const form = new FormData();
        form.append('part_numbers', text);
        form.append('fetch_market', fetchMarket);
        const resp = await fetch('/api/search/bulk', {method: 'POST', body: form});
        const data = await resp.json();
        renderResults(data.results);
    } catch(e) {
        showError(e.message);
    }
    hideLoading();
}

async function searchFile() {
    const file = document.getElementById('file-input').files[0];
    if (!file) return;
    const fetchMarket = document.getElementById('file-fetch-market').checked;
    showLoading();
    try {
        const form = new FormData();
        form.append('file', file);
        form.append('fetch_market', fetchMarket);
        const resp = await fetch('/api/search/bulk-file', {method: 'POST', body: form});
        const data = await resp.json();
        renderResults(data.results);
    } catch(e) {
        showError(e.message);
    }
    hideLoading();
}

function showLoading() {
    document.getElementById('loading').classList.remove('hidden');
    document.getElementById('results').innerHTML = '';
}
function hideLoading() {
    document.getElementById('loading').classList.add('hidden');
}
function showError(msg) {
    document.getElementById('results').innerHTML =
        `<div class="bg-red-50 text-red-700 rounded-lg p-4">${msg}</div>`;
}

function renderResults(items) {
    const container = document.getElementById('results');
    if (!items || items.length === 0) {
        container.innerHTML = '<div class="text-gray-500 text-center py-8">Ничего не найдено</div>';
        return;
    }

    let html = '';
    for (const item of items) {
        html += renderOneResult(item);
    }
    container.innerHTML = html;

    // Рисуем графики истории
    for (const item of items) {
        if (item.history && item.history.length > 1) {
            renderChart(item.part_number_clean, item.history);
        }
    }
}

function renderOneResult(item) {
    const pn = item.query || item.part_number_clean;
    const our = item.our_prices;
    const ms = item.market_stats;
    const pos = item.position || {};

    let html = `<div class="bg-white rounded-xl border border-gray-200 p-5 mb-4">`;
    html += `<div class="flex items-center justify-between mb-3">
        <h3 class="text-lg font-bold text-gray-900">${pn}</h3>`;

    // Кнопка «добавить в мониторинг»
    html += `<button onclick="addToWatchlist('${item.part_number_clean}')" class="text-sm text-blue-600 hover:text-blue-800">+ В мониторинг</button>`;
    html += `</div>`;

    // Поставщики
    if (item.suppliers && item.suppliers.length > 0) {
        html += `<div class="mb-3"><div class="text-xs font-medium text-gray-400 uppercase mb-1">Закупка (поставщики)</div>`;
        html += `<div class="overflow-x-auto"><table class="w-full text-sm">
            <tr class="text-gray-500 text-left"><th class="pr-4">Поставщик</th><th class="pr-4">Бренд</th><th class="pr-4">Цена</th><th>В рублях</th></tr>`;
        for (const s of item.suppliers) {
            html += `<tr><td class="pr-4">${s.supplier}</td><td class="pr-4">${s.brand}</td>
                <td class="pr-4 font-mono">${s.price} ${s.currency}</td>
                <td class="font-mono font-medium">${s.price_rub ? s.price_rub.toLocaleString('ru') + ' ₽' : '—'}</td></tr>`;
        }
        html += `</table></div></div>`;
    }

    // Наши цены vs рынок
    html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-3">`;

    // Левая колонка — наши цены
    html += `<div><div class="text-xs font-medium text-gray-400 uppercase mb-1">Наши цены (₽)</div>`;
    if (our) {
        const rows = [
            ['Заказ под клиента', our.price_order, pos.order],
            ['Склад 3PL', our.price_3pl, pos['3pl']],
            ['Через EMEX', our.price_3pl_emex, pos['3pl_emex']],
        ];
        html += `<table class="w-full text-sm">`;
        for (const [label, price, position] of rows) {
            const badge = position ? statusBadge(position.status, position.vs_avg) : '';
            html += `<tr><td class="text-gray-600 pr-3">${label}</td>
                <td class="font-mono font-medium pr-3">${price ? price.toLocaleString('ru') + ' ₽' : '—'}</td>
                <td>${badge}</td></tr>`;
        }
        html += `</table>`;
    } else {
        html += `<div class="text-gray-400 text-sm">Не загружены</div>`;
    }
    html += `</div>`;

    // Правая колонка — рынок
    html += `<div><div class="text-xs font-medium text-gray-400 uppercase mb-1">Рынок (Emex)</div>`;
    if (ms && ms.count) {
        html += `<table class="w-full text-sm">
            <tr><td class="text-gray-600 pr-3">Минимум</td><td class="font-mono font-medium">${ms.min.toLocaleString('ru')} ₽</td></tr>
            <tr><td class="text-gray-600 pr-3">Средняя</td><td class="font-mono font-medium">${ms.avg.toLocaleString('ru')} ₽</td></tr>
            <tr><td class="text-gray-600 pr-3">Максимум</td><td class="font-mono font-medium">${ms.max.toLocaleString('ru')} ₽</td></tr>
            <tr><td class="text-gray-600 pr-3">Предложений</td><td class="font-mono">${ms.count}</td></tr>
        </table>`;
    } else {
        html += `<div class="text-gray-400 text-sm">Нет данных. Нажмите «Запросить Emex».</div>`;
    }
    html += `</div></div>`;

    // Топ предложений рынка
    if (item.market && item.market.length > 0) {
        html += `<details class="mb-3"><summary class="text-sm text-blue-600 cursor-pointer">Предложения рынка (${item.market.length})</summary>`;
        html += `<div class="overflow-x-auto mt-2"><table class="w-full text-sm">
            <tr class="text-gray-500 text-left"><th class="pr-3">Цена</th><th class="pr-3">Срок</th><th class="pr-3">Кол-во</th><th class="pr-3">Продавец</th><th>Рейтинг</th></tr>`;
        for (const m of item.market) {
            html += `<tr>
                <td class="pr-3 font-mono font-medium">${m.price.toLocaleString('ru')} ₽</td>
                <td class="pr-3">${m.delivery_days} дн.</td>
                <td class="pr-3">${m.quantity} шт.</td>
                <td class="pr-3">${m.seller}</td>
                <td>${m.rating || '—'}</td>
            </tr>`;
        }
        html += `</table></div></details>`;
    }

    // График истории
    if (item.history && item.history.length > 1) {
        html += `<div class="mt-3"><div class="text-xs font-medium text-gray-400 uppercase mb-1">История цен</div>
            <canvas id="chart-${item.part_number_clean}" height="120"></canvas></div>`;
    }

    html += `</div>`;
    return html;
}

function statusBadge(status, pct) {
    const colors = {
        'ниже': 'bg-green-100 text-green-700',
        'выше': 'bg-red-100 text-red-700',
        'в рынке': 'bg-gray-100 text-gray-600',
    };
    const sign = pct > 0 ? '+' : '';
    return `<span class="inline-block px-2 py-0.5 rounded-full text-xs font-medium ${colors[status] || ''}">${sign}${pct}%</span>`;
}

function renderChart(id, history) {
    const ctx = document.getElementById('chart-' + id);
    if (!ctx) return;
    const labels = history.map(h => new Date(h.fetched_at).toLocaleDateString('ru'));
    const data = history.map(h => h.price);
    new Chart(ctx, {
        type: 'line',
        data: {
            labels,
            datasets: [{
                label: 'Цена ₽',
                data,
                borderColor: '#3b82f6',
                backgroundColor: 'rgba(59,130,246,0.1)',
                fill: true,
                tension: 0.3,
                pointRadius: 2,
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                x: { display: true, grid: { display: false } },
                y: { display: true, grid: { color: '#f3f4f6' } },
            }
        }
    });
}

async function addToWatchlist(pn) {
    const form = new FormData();
    form.append('part_number', pn);
    const resp = await fetch('/api/market/watchlist', { method: 'POST', body: form });
    const data = await resp.json();
    alert(data.message || 'Готово');
}

// URL query parameter support
const urlQ = new URLSearchParams(window.location.search).get('q');
if (urlQ) {
    document.getElementById('single-input').value = urlQ;
    searchSingle();
}
</script>
{% endblock %}
